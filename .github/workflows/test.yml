name: tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install plugin + test extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run pytest
        run: pytest -v --tb=short

  # Real-MLflow (non-mocked) integration gate, run against BOTH a 2.x and a
  # 3.x install so MLflow-version support stays tested, not assumed. Exercises
  # every plugin flow on a real tracking store: training anchor,
  # ArioMlflowClient registration + promotion, VerifiedModel load + predict
  # (incl. tamper rejection), full_verify with live source-of-truth refetch,
  # and dataset anchoring (see docs/mlflow-v3-support.md).
  integration:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mlflow: ["<3", ">=3"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install plugin + test extras + MLflow ${{ matrix.mlflow }} + sklearn
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]" "mlflow${{ matrix.mlflow }}" scikit-learn

      - name: Report MLflow version
        run: python -c "import mlflow; print('MLflow', mlflow.__version__)"

      - name: Run real-MLflow integration gate
        env:
          ARIO_MLFLOW_INTEGRATION: "1"
        run: pytest tests/test_mlflow3_integration.py -v --tb=short
